<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Smart Calculator</title>
  <link rel="stylesheet" href="css/style.css">


</head>

<body>
  <div class="calculator">
    <div class="top-bar">
      <button class="icon-btn" id="theme-toggle" title="Toggle theme">🌙</button>
      <button class="icon-btn" id="history-toggle" title="Toggle history">📜</button>
    </div>

    <input type="text" id="display" disabled>

    <div id="history-panel" class="history-panel hidden">
      <ul id="history-list"></ul>
      <button class="secondary-btn" id="clear-history">Clear History</button>
    </div>

    <div class="buttons">
      <button onclick="appendValue('C')">C</button>
      <button onclick="deleteLast()">DEL</button>
      <button onclick="appendValue('%')">%</button>
      <button onclick="appendValue('/')">/</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('*')">*</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('-')">-</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('+')">+</button>

      <button onclick="appendValue('0')" class="zero">0</button>
      <button onclick="appendValue('.')">.</button>
      <button onclick="calculate()">=</button>
    </div>
  </div>
  <script src="js/calculator.js"></script>
</body>

</html>
