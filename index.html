<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>✨ AetherCore | Perfect Calculator + Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, -apple-system, monospace;
        }

        /* FULL VIEWPORT, NO SCROLL EVER */
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #0b1120, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* MAIN CARD — PERFECT FIT, NO EXTERNAL SCROLL */
        .impressive-calc {
            width: 100%;
            max-width: 1400px;
            height: 100%;
            max-height: 96vh;
            background: rgba(12, 18, 28, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* FLEX ROW — TAKES ALL SPACE, NO OVERFLOW */
        .dashboard {
            display: flex;
            flex-wrap: nowrap;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* LEFT: CALCULATOR CORE */
        .calc-core {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 260px;
            overflow: hidden;
        }

        /* RIGHT: NOTES PANEL — INTERNAL SCROLL ONLY */
        .notes-panel {
            flex: 1.2;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 1.8rem;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            overflow: hidden;
            min-width: 240px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid rgba(241, 152, 62, 0.5);
            padding-bottom: 0.4rem;
            flex-shrink: 0;
        }

        .panel-header h3 {
            color: #f8e3b0;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clear-history {
            background: none;
            border: none;
            color: #ff9f6e;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 30px;
            background: rgba(255, 100, 50, 0.2);
            transition: 0.2s;
        }

        .clear-history:hover {
            background: rgba(255, 100, 50, 0.5);
            color: white;
        }

        /* SCROLLABLE HISTORY — ONLY THIS SCROLLS */
        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
            min-height: 0;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #f39c12;
            border-radius: 10px;
        }

        .history-item {
            background: rgba(20, 28, 40, 0.7);
            border-radius: 1rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid #f39c12;
            color: #ccddf8;
        }
        .history-item:hover {
            background: rgba(243, 156, 18, 0.2);
            transform: translateX(4px);
        }
        .history-expr {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            word-break: break-word;
        }
        .history-result {
            font-size: 0.65rem;
            color: #f1c40f;
            margin-top: 3px;
        }
        .empty-msg {
            color: #6c7a91;
            text-align: center;
            padding: 1rem;
            font-style: italic;
            font-size: 0.75rem;
        }

        /* DISPLAY STYLES */
        .main-display {
            background: #03070fcc;
            border-radius: 1.6rem;
            padding: 1rem 1.2rem;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }
        .expression {
            font-size: 0.8rem;
            color: #9ab3d5;
            min-height: 22px;
            font-family: monospace;
            word-break: break-all;
        }
        .current-value {
            font-size: 2.4rem;
            font-weight: 700;
            color: #f5f9ff;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-word;
            line-height: 1.2;
        }

        /* BUTTON GRID — RESPONSIVE & TIGHT */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.6rem;
            flex-shrink: 0;
        }
        .calc-btn {
            background: #1e293b;
            border: none;
            padding: 0.8rem 0;
            border-radius: 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #eef3ff;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 3px 0 #0f1119;
        }
        .calc-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f1119;
        }
        .operator {
            background: #f39c12;
            color: #1f1b0c;
            box-shadow: 0 3px 0 #b45f06;
        }
        .equals {
            background: #2ecc71;
            color: #0a2f1a;
            box-shadow: 0 3px 0 #1f8a4c;
        }
        .clear-btn {
            background: #e67e22;
            color: #2c1a08;
        }
        .func-btn {
            background: #2c3e66;
            color: #ffdc97;
        }
        .span-2 {
            grid-column: span 2;
        }

        /* MEMORY BAR */
        .memory-bar {
            background: #0f1420cc;
            border-radius: 1.2rem;
            padding: 0.6rem;
            flex-shrink: 0;
        }
        .memory-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffb347;
            margin-bottom: 6px;
        }
        .memory-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .mem-btn {
            background: #1e293b;
            border: none;
            color: #f0e6a0;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .mem-btn:active {
            transform: scale(0.96);
        }
        .memory-value {
            font-size: 0.7rem;
            color: #f7d44a;
            background: #00000055;
            padding: 4px 8px;
            border-radius: 30px;
            text-align: center;
            margin-top: 6px;
            font-family: monospace;
        }

        .brand {
            text-align: center;
            margin-top: 0.6rem;
            font-size: 0.65rem;
            color: #5e6f8d;
            flex-shrink: 0;
        }

        /* PERFECT RESPONSIVE: ADJUST FOR SMALL SCREENS */
        @media (max-width: 780px) {
            body { padding: 0.5rem; }
            .impressive-calc { padding: 0.8rem; max-height: 98vh; }
            .current-value { font-size: 1.8rem; }
            .calc-btn { padding: 0.5rem 0; font-size: 0.9rem; }
            .button-grid { gap: 0.4rem; }
            .notes-panel { padding: 0.7rem; min-width: 200px; }
            .panel-header h3 { font-size: 0.75rem; }
        }

        /* LARGE SCREENS: BETTER PROPORTIONS */
        @media (min-width: 1400px) {
            .impressive-calc { max-width: 1600px; max-height: 90vh; }
            .current-value { font-size: 2.8rem; }
            .calc-btn { padding: 1rem 0; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="impressive-calc">
    <div class="dashboard">
        <!-- LEFT: CALCULATOR CORE -->
        <div class="calc-core">
            <div class="main-display">
                <div class="expression" id="expressionPreview"></div>
                <div class="current-value" id="displayMain">0</div>
            </div>
            <div class="button-grid">
                <button class="calc-btn func-btn" data-action="sqrt">√</button>
                <button class="calc-btn func-btn" data-action="square">x²</button>
                <button class="calc-btn func-btn" data-action="reciprocal">1/x</button>
                <button class="calc-btn clear-btn" data-action="clear">C</button>
                <button class="calc-btn" data-action="del">⌫</button>
                
                <button class="calc-btn" data-value="7">7</button>
                <button class="calc-btn" data-value="8">8</button>
                <button class="calc-btn" data-value="9">9</button>
                <button class="calc-btn operator" data-op="/">÷</button>
                <button class="calc-btn func-btn" data-action="percent">%</button>
                
                <button class="calc-btn" data-value="4">4</button>
                <button class="calc-btn" data-value="5">5</button>
                <button class="calc-btn" data-value="6">6</button>
                <button class="calc-btn operator" data-op="*">×</button>
                <button class="calc-btn func-btn" data-action="memoryRecall">MR</button>
                
                <button class="calc-btn" data-value="1">1</button>
                <button class="calc-btn" data-value="2">2</button>
                <button class="calc-btn" data-value="3">3</button>
                <button class="calc-btn operator" data-op="-">−</button>
                <button class="calc-btn func-btn" data-action="memoryAdd">M+</button>
                
                <button class="calc-btn" data-value="0">0</button>
                <button class="calc-btn" data-value=".">.</button>
                <button class="calc-btn operator" data-op="+">+</button>
                <button class="calc-btn equals span-2" data-action="equals">=</button>
            </div>
            <div class="memory-bar">
                <div class="memory-title">🧠 MEMORY BANK</div>
                <div class="memory-buttons">
                    <button class="mem-btn" id="memStore">M+ (store)</button>
                    <button class="mem-btn" id="memSubtract">M- (subtract)</button>
                    <button class="mem-btn" id="memRecall">MR (recall)</button>
                    <button class="mem-btn" id="memClear">MC (clear)</button>
                </div>
                <div class="memory-value" id="memDisplay">M = 0</div>
            </div>
        </div>

        <!-- RIGHT: NOTES & HISTORY PANEL (SCROLLABLE INTERNALLY) -->
        <div class="notes-panel">
            <div class="panel-header">
                <h3>📋 SMART NOTES & HISTORY</h3>
                <button class="clear-history" id="clearHistoryBtn">🗑 clear all</button>
            </div>
            <div class="history-list" id="historyContainer">
                <div class="empty-msg">✨ calculations appear here<br>click any to reuse</div>
            </div>
            <div style="font-size: 0.6rem; color:#ffb86b; text-align:center; padding-top: 4px;">
                ⚡ auto‑saves last 20 entries
            </div>
        </div>
    </div>
    <div class="brand">🔥 AETHER CORE · perfect proportions · zero external scroll · live memory</div>
</div>

<script>
    // ULTIMATE CALCULATOR: PERFECT LAYOUT, FULL FUNCTIONALITY
    class UltimateCalculator {
        constructor() {
            this.displayMain = document.getElementById('displayMain');
            this.expressionDiv = document.getElementById('expressionPreview');
            this.historyContainer = document.getElementById('historyContainer');
            this.memSpan = document.getElementById('memDisplay');
            
            this.currentInput = "0";
            this.previousValue = null;
            this.currentOperator = null;
            this.waitingForNewOperand = false;
            this.errorState = false;
            this.memory = 0;
            this.history = [];
            
            this.updateDisplay();
            this.renderHistory();
            this.updateMemoryDisplay();
            this.bindButtons();
            this.bindKeyboard();
        }
        
        updateDisplay() {
            if (this.errorState) {
                this.displayMain.innerText = "🚫 ERROR";
                return;
            }
            let val = this.currentInput;
            if (val === "" || val === undefined) val = "0";
            if (val.length > 20 && !val.includes("e")) {
                val = parseFloat(val).toExponential(10);
            }
            this.displayMain.innerText = val;
            if (this.currentOperator && this.previousValue !== null && !this.waitingForNewOperand) {
                this.expressionDiv.innerText = `${this.formatNumber(this.previousValue)} ${this.currentOperator} ${this.currentInput}`;
            } else if (this.previousValue !== null && this.currentOperator && this.waitingForNewOperand) {
                this.expressionDiv.innerText = `${this.formatNumber(this.previousValue)} ${this.currentOperator} ...`;
            } else {
                this.expressionDiv.innerText = "";
            }
        }
        
        formatNumber(n) {
            if (n === null || n === undefined) return "";
            let num = parseFloat(n);
            if (isNaN(num)) return n.toString().slice(0, 12);
            if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-6 && num !== 0)) return num.toExponential(8);
            return num.toString().replace(/\.?0+$/, '');
        }
        
        updateMemoryDisplay() {
            let memVal = this.memory;
            let memStr = (typeof memVal === 'number') ? memVal.toFixed(8).replace(/\.?0+$/, '') : "0";
            this.memSpan.innerText = `M = ${memStr}`;
        }
        
        addToHistory(expression, resultRaw) {
            let resultStr = (typeof resultRaw === 'number') ? this.formatNumber(resultRaw) : String(resultRaw);
            this.history.unshift({ expression: expression, result: resultStr });
            if (this.history.length > 20) this.history.pop();
            this.renderHistory();
        }
        
        renderHistory() {
            if (!this.historyContainer) return;
            if (this.history.length === 0) {
                this.historyContainer.innerHTML = `<div class="empty-msg">✨ calculations appear here<br>click any to reuse</div>`;
                return;
            }
            this.historyContainer.innerHTML = this.history.map((item, idx) => `
                <div class="history-item" data-history-index="${idx}">
                    <div class="history-expr">${this.escapeHtml(item.expression)}</div>
                    <div class="history-result">= ${this.escapeHtml(item.result)}</div>
                </div>
            `).join('');
            document.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    const idx = el.getAttribute('data-history-index');
                    if (idx !== null && this.history[parseInt(idx)]) {
                        let resultVal = this.history[parseInt(idx)].result;
                        let parsed = parseFloat(resultVal);
                        if (!isNaN(parsed)) {
                            this.resetToFresh();
                            this.currentInput = parsed.toString();
                            this.waitingForNewOperand = false;
                            this.currentOperator = null;
                            this.previousValue = null;
                            this.errorState = false;
                            this.updateDisplay();
                        }
                    }
                    e.stopPropagation();
                });
            });
        }
        
        escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
        
        resetToFresh() {
            this.currentInput = "0";
            this.previousValue = null;
            this.currentOperator = null;
            this.waitingForNewOperand = false;
            this.errorState = false;
            this.updateDisplay();
        }
        
        resetAll() { this.resetToFresh(); }
        
        evaluate() {
            if (this.currentOperator === null || this.previousValue === null) return null;
            let a = parseFloat(this.previousValue);
            let b = parseFloat(this.currentInput);
            if (isNaN(a) || isNaN(b)) return null;
            let result = null;
            switch (this.currentOperator) {
                case '+': result = a + b; break;
                case '-': result = a - b; break;
                case '*': result = a * b; break;
                case '/': 
                    if (b === 0) return "DIV_ZERO";
                    result = a / b; 
                    break;
                default: return null;
            }
            if (typeof result === 'number') result = parseFloat(result.toFixed(12));
            return result;
        }
        
        computeEquals() {
            if (this.errorState) {
                this.resetAll();
                return;
            }
            if (this.currentOperator && this.previousValue !== null && !this.waitingForNewOperand) {
                const expr = `${this.formatNumber(this.previousValue)} ${this.currentOperator} ${this.currentInput}`;
                let res = this.evaluate();
                if (res === "DIV_ZERO") {
                    this.errorState = true;
                    this.updateDisplay();
                    return;
                }
                if (res !== null) {
                    this.addToHistory(expr, res);
                    this.currentInput = res.toString();
                    this.previousValue = null;
                    this.currentOperator = null;
                    this.waitingForNewOperand = true;
                    this.errorState = false;
                    this.updateDisplay();
                }
            } else if (this.currentOperator === null && this.previousValue === null && !this.waitingForNewOperand && this.currentInput !== "0") {
                this.addToHistory(`val = ${this.currentInput}`, this.currentInput);
            }
        }
        
        setOperator(op) {
            if (this.errorState) { this.resetAll(); }
            if (this.waitingForNewOperand && this.currentOperator !== null) {
                this.currentOperator = op;
                this.updateDisplay();
                return;
            }
            if (this.currentOperator !== null && this.previousValue !== null && !this.waitingForNewOperand) {
                let res = this.evaluate();
                if (res === "DIV_ZERO") {
                    this.errorState = true;
                    this.updateDisplay();
                    return;
                }
                if (res !== null) {
                    this.previousValue = res;
                    this.currentInput = res.toString();
                } else {
                    this.previousValue = parseFloat(this.currentInput);
                }
            } else {
                if (this.previousValue === null) {
                    this.previousValue = parseFloat(this.currentInput);
                }
            }
            this.currentOperator = op;
            this.waitingForNewOperand = true;
            this.updateDisplay();
        }
        
        appendNumber(numStr) {
            if (this.errorState) { this.resetAll(); }
            if (this.waitingForNewOperand) {
                this.currentInput = numStr;
                this.waitingForNewOperand = false;
            } else {
                if (this.currentInput === "0" && numStr !== ".") {
                    this.currentInput = numStr;
                } else {
                    if (numStr === "." && this.currentInput.includes(".")) return;
                    this.currentInput += numStr;
                }
            }
            if (this.currentInput.length > 22 && !this.currentInput.includes("e")) {
                this.currentInput = this.currentInput.slice(0, 22);
            }
            this.updateDisplay();
        }
        
        deleteLast() {
            if (this.errorState) { this.resetAll(); return; }
            if (this.waitingForNewOperand) return;
            let curr = this.currentInput;
            if (curr.length === 1 || (curr.length === 2 && curr.startsWith("-"))) {
                this.currentInput = "0";
            } else {
                this.currentInput = curr.slice(0, -1);
                if (this.currentInput === "") this.currentInput = "0";
            }
            this.updateDisplay();
        }
        
        applyFunction(func) {
            if (this.errorState) { this.resetAll(); }
            let val = parseFloat(this.currentInput);
            if (isNaN(val)) return;
            let newVal = val;
            let exprFunc = "";
            switch (func) {
                case 'sqrt': newVal = Math.sqrt(val); exprFunc = `√(${this.formatNumber(val)})`; break;
                case 'square': newVal = val * val; exprFunc = `sqr(${this.formatNumber(val)})`; break;
                case 'reciprocal': 
                    if (val === 0) { this.errorState = true; this.updateDisplay(); return; }
                    newVal = 1 / val; 
                    exprFunc = `1/(${this.formatNumber(val)})`;
                    break;
                case 'percent': newVal = val / 100; exprFunc = `${this.formatNumber(val)}%`; break;
                default: return;
            }
            this.addToHistory(exprFunc, newVal);
            this.currentInput = newVal.toString();
            this.previousValue = null;
            this.currentOperator = null;
            this.waitingForNewOperand = true;
            this.errorState = false;
            this.updateDisplay();
        }
        
        memoryAdd() {
            let cur = parseFloat(this.currentInput);
            if (!isNaN(cur) && !this.errorState) {
                this.memory += cur;
                this.updateMemoryDisplay();
            }
        }
        memorySubtract() {
            let cur = parseFloat(this.currentInput);
            if (!isNaN(cur) && !this.errorState) {
                this.memory -= cur;
                this.updateMemoryDisplay();
            }
        }
        memoryRecall() {
            if (this.errorState) this.resetAll();
            this.currentInput = this.memory.toString();
            this.waitingForNewOperand = false;
            this.currentOperator = null;
            this.previousValue = null;
            this.updateDisplay();
        }
        memoryClear() {
            this.memory = 0;
            this.updateMemoryDisplay();
        }
        clearHistory() {
            this.history = [];
            this.renderHistory();
        }
        
        bindButtons() {
            document.querySelectorAll('[data-value]').forEach(btn => {
                btn.addEventListener('click', () => this.appendNumber(btn.getAttribute('data-value')));
            });
            document.querySelectorAll('[data-op]').forEach(btn => {
                btn.addEventListener('click', () => {
                    let op = btn.getAttribute('data-op');
                    if (op === '÷') op = '/';
                    if (op === '×') op = '*';
                    if (op === '−') op = '-';
                    this.setOperator(op);
                });
            });
            const equalsBtn = document.querySelector('[data-action="equals"]');
            if (equalsBtn) equalsBtn.addEventListener('click', () => this.computeEquals());
            const clearBtn = document.querySelector('[data-action="clear"]');
            if (clearBtn) clearBtn.addEventListener('click', () => this.resetAll());
            const delBtn = document.querySelector('[data-action="del"]');
            if (delBtn) delBtn.addEventListener('click', () => this.deleteLast());
            
            document.querySelectorAll('[data-action]').forEach(btn => {
                const act = btn.getAttribute('data-action');
                if (act === 'sqrt' || act === 'square' || act === 'reciprocal' || act === 'percent') {
                    btn.addEventListener('click', () => this.applyFunction(act));
                }
                if (act === 'memoryAdd') btn.addEventListener('click', () => this.memoryAdd());
                if (act === 'memoryRecall') btn.addEventListener('click', () => this.memoryRecall());
            });
            document.getElementById('memStore')?.addEventListener('click', () => this.memoryAdd());
            document.getElementById('memSubtract')?.addEventListener('click', () => this.memorySubtract());
            document.getElementById('memRecall')?.addEventListener('click', () => this.memoryRecall());
            document.getElementById('memClear')?.addEventListener('click', () => this.memoryClear());
            document.getElementById('clearHistoryBtn')?.addEventListener('click', () => this.clearHistory());
        }
        
        bindKeyboard() {
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (/[0-9]/.test(key)) { e.preventDefault(); this.appendNumber(key); }
                else if (key === '.') { e.preventDefault(); this.appendNumber('.'); }
                else if (key === '+' || key === '-' || key === '*' || key === '/') { e.preventDefault(); this.setOperator(key); }
                else if (key === 'Enter' || key === '=') { e.preventDefault(); this.computeEquals(); }
                else if (key === 'Backspace') { e.preventDefault(); this.deleteLast(); }
                else if (key === 'Escape') { e.preventDefault(); this.resetAll(); }
                else if (key === '%') { e.preventDefault(); this.applyFunction('percent'); }
            });
        }
    }
    
    window.addEventListener('DOMContentLoaded', () => { new UltimateCalculator(); });
</script>
</body>
</html>
